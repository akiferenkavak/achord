<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitar Akort Uygulaması</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="tuner-container">
        <h1>Gitar Akortçu</h1>

        <div class="ws-status" id="ws-status">⬤ Bağlı değil</div>

        <div class="gauge">
            <div class="gauge-marks">
                <span class="mark mark-left">♭</span>
                <span class="mark mark-center">|</span>
                <span class="mark mark-right">♯</span>
            </div>
            <div class="needle" id="needle"></div>
            <div class="center-point"></div>
        </div>

        <div class="note-display">
            <span id="current-note">—</span>
            <p id="status-text">Standart Akort</p>
            <small id="freq-text"></small>
        </div>

        <div class="strings">
            <button class="string-btn" onclick="selectString(0)">E</button>
            <button class="string-btn" onclick="selectString(1)">A</button>
            <button class="string-btn" onclick="selectString(2)">D</button>
            <button class="string-btn" onclick="selectString(3)">G</button>
            <button class="string-btn" onclick="selectString(4)">B</button>
            <button class="string-btn active" onclick="selectString(5)">e</button>
        </div>

        <button class="start-btn" id="start-btn" onclick="toggleMic()">
            Mikrofonu Başlat
        </button>
    </div>

    <script>
        // ─── WebSocket URL (http→ws, https→wss otomatik) ──────────────────────
        const WS_PROTO = location.protocol === 'https:' ? 'wss' : 'ws';
        const WS_URL   = `${WS_PROTO}://${location.hostname || 'localhost'}:8765`;

        let ws            = null;
        let micRunning    = false;
        let audioCtx      = null;
        let micSource     = null;
        let processor     = null;
        let micStream     = null;
        let selectedStr   = 5;
        const CHUNK       = 4096;   // Python tarafıyla eşleşmeli

        // ─── Tel seçimi ───────────────────────────────────────────────────────
        function selectString(i) {
            selectedStr = i;
            document.querySelectorAll('.string-btn').forEach((b, j) =>
                b.classList.toggle('active', j === i)
            );
        }

        // ─── Başlat / Durdur ──────────────────────────────────────────────────
        async function toggleMic() {
            if (!micRunning) await startMic();
            else             stopMic();
        }

        async function startMic() {
            // 1) WebSocket bağla
            ws = new WebSocket(WS_URL);
            ws.binaryType = 'arraybuffer';

            await new Promise((resolve, reject) => {
                ws.onopen  = resolve;
                ws.onerror = reject;
            }).catch(() => {
                setWsIndicator('error');
                setStatus('Sunucuya bağlanılamadı!', 'error');
                return;
            });

            setWsIndicator('ok');

            // 2) Mikrofon aç (HTTPS veya localhost'ta çalışır)
            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            } catch(e) {
                setStatus('Mikrofon izni reddedildi!', 'error');
                ws.close();
                return;
            }

            // 3) Web Audio pipeline: mikrofon → ScriptProcessor → WebSocket
            audioCtx  = new AudioContext({ sampleRate: 44100 });
            micSource = audioCtx.createMediaStreamSource(micStream);
            processor = audioCtx.createScriptProcessor(CHUNK, 1, 1);

            processor.onaudioprocess = (e) => {
                if (ws.readyState !== WebSocket.OPEN) return;
                // Float32Array → binary → Python'a gönder
                const samples = e.inputBuffer.getChannelData(0);
                ws.send(samples.buffer);
            };

            micSource.connect(processor);
            processor.connect(audioCtx.destination);

            // 4) Python'dan gelen sonuçları dinle
            ws.onmessage = (ev) => {
                try { handleData(JSON.parse(ev.data)); } catch(_) {}
            };

            ws.onclose = () => {
                stopMic();
            };

            micRunning = true;
            document.getElementById('start-btn').textContent = 'Durdur';
            document.getElementById('start-btn').classList.add('active');
        }

        function stopMic() {
            if (processor)  { processor.disconnect();  processor  = null; }
            if (micSource)  { micSource.disconnect();  micSource  = null; }
            if (audioCtx)   { audioCtx.close();        audioCtx   = null; }
            if (micStream)  { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
            if (ws && ws.readyState === WebSocket.OPEN) ws.close();

            micRunning = false;
            document.getElementById('start-btn').textContent = 'Mikrofonu Başlat';
            document.getElementById('start-btn').classList.remove('active');
            setWsIndicator('off');
            resetUI();
        }

        // ─── WS durum göstergesi ──────────────────────────────────────────────
        function setWsIndicator(state) {
            const el = document.getElementById('ws-status');
            const map = {
                ok:    ['⬤ Bağlandı',    'ws-status ok'],
                error: ['⬤ Hata',        'ws-status error'],
                off:   ['⬤ Bağlı değil', 'ws-status'],
            };
            [el.textContent, el.className] = map[state] ?? map.off;
        }

        // ─── Python'dan gelen veriyi UI'a yansıt ─────────────────────────────
        function handleData(data) {
            if (data.silent) {
                setNeedle(0);
                setStatus('Ses bekleniyor...', '');
                return;
            }
            const { note, octave, cents, freq } = data;
            document.getElementById('current-note').textContent = note + octave;
            document.getElementById('freq-text').textContent    = freq + ' Hz';
            setNeedle(cents);
            if      (Math.abs(cents) <= 5) setStatus('✓ Tam Akort',    'in-tune');
            else if (cents > 5)            setStatus('▲ Teli Gevşet',  'sharp');
            else                           setStatus('▼ Teli Ger',     'flat');
        }

        // ─── Gauge iğnesi  (cents -50..+50 → açı -75°..+75°) ─────────────────
        function setNeedle(cents) {
            const angle = Math.max(-75, Math.min(75, cents * 1.5));
            document.getElementById('needle').style.transform =
                `translateX(-50%) rotate(${angle}deg)`;
        }

        function setStatus(text, cls) {
            document.getElementById('status-text').textContent  = text;
            document.getElementById('current-note').className   = cls;
        }

        function resetUI() {
            document.getElementById('current-note').textContent = '—';
            document.getElementById('current-note').className   = '';
            document.getElementById('freq-text').textContent    = '';
            setStatus('Standart Akort', '');
            setNeedle(0);
        }
    </script>
</body>
</html>
